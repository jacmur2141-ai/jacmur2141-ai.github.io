<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full Screen Mega Arcade</title>
    <style>
        /* Full Screen Layout */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: #000; color: #0f0;
            font-family: 'Courier New', monospace;
        }
        
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Floating "Switch Game" Button */
        #switch-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 15px 25px; background: rgba(0, 255, 0, 0.2);
            color: #0f0; border: 2px solid #0f0; font-weight: bold;
            cursor: pointer; z-index: 100; border-radius: 5px;
            text-transform: uppercase;
        }
        #switch-btn:hover { background: #0f0; color: #000; }

        /* Text UI for Non-Canvas games */
        #ui-layer {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; pointer-events: none;
        }
        #ui-layer button, #ui-layer input { pointer-events: auto; }
        .game-title { position: absolute; top: 20px; left: 20px; font-size: 1.2em; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="game-title" class="game-title">SNAKE</div>
    <button id="switch-btn" onclick="nextGame()">Next Game ➔</button>

    <div id="ui-layer"></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui-layer');
    const title = document.getElementById('game-title');
    
    let gameList = ['snake', 'pong', 'dodge', 'catch', 'jump', 'void', 'clicker', 'math', 'guess', 'color', 'reflex', 'blocks', 'tiles'];
    let gameIndex = 0;
    let loop, score = 0;

    // Resize canvas to full screen
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function nextGame() {
        gameIndex = (gameIndex + 1) % gameList.length;
        startGame(gameList[gameIndex]);
    }

    function startGame(id) {
        clearInterval(loop);
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ui.innerHTML = "";
        score = 0;
        title.innerText = id.toUpperCase();

        if(id === 'snake') startSnake();
        if(id === 'pong') startPong();
        if(id === 'dodge') startDodge();
        if(id === 'catch') startCatch();
        if(id === 'jump') startJump();
        if(id === 'void') startVoid();
        if(id === 'clicker') startClicker();
        if(id === 'math') startMath();
        // Add more starters here...
    }

    // --- GAME 1: SNAKE (Full Screen) ---
    function startSnake() {
        let size = 30;
        let s = [{x:5,y:5}], d = {x:1,y:0}, f = {x:10,y:10};
        document.onkeydown = e => {
            if(e.key.includes('Up') && d.y==0) d={x:0,y:-1};
            if(e.key.includes('Down') && d.y==0) d={x:0,y:1};
            if(e.key.includes('Left') && d.x==0) d={x:-1,y:0};
            if(e.key.includes('Right') && d.x==0) d={x:1,y:0};
        };
        loop = setInterval(() => {
            let h = {x:s[0].x+d.x, y:s[0].y+d.y};
            s.unshift(h);
            if(h.x==f.x && h.y==f.y) {
                f = {x:Math.floor(Math.random()*(canvas.width/size)), y:Math.floor(Math.random()*(canvas.height/size))};
            } else s.pop();

            ctx.fillStyle = "#000"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "red"; ctx.fillRect(f.x*size, f.y*size, size-2, size-2);
            ctx.fillStyle = "#0f0"; s.forEach(p => ctx.fillRect(p.x*size, p.y*size, size-2, size-2));

            if(h.x < 0 || h.y < 0 || h.x*size > canvas.width || h.y*size > canvas.height) startGame('snake');
        }, 100);
    }

    // --- GAME 2: PADDLE (Full Screen) ---
    function startPong() {
        let bx=100, by=100, dx=5, dy=5, px=canvas.width/2;
        window.onmousemove = e => px = e.clientX - 50;
        loop = setInterval(() => {
            ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(bx,by,15,0,7); ctx.fill();
            ctx.fillRect(px, canvas.height-40, 100, 20);
            bx+=dx; by+=dy;
            if(bx<0 || bx>canvas.width) dx=-dx;
            if(by<0) dy=-dy;
            if(by > canvas.height-60 && bx > px && bx < px+100) dy=-dy;
            if(by > canvas.height) { bx=100; by=100; }
        }, 16);
    }

    // --- GAME 3: VOID (Full Screen) ---
    function startVoid() {
        let x = canvas.width/2, y = canvas.height/2;
        document.onkeydown = e => {
            if(e.key.includes('Up')) y-=20; if(e.key.includes('Down')) y+=20;
            if(e.key.includes('Left')) x-=20; if(e.key.includes('Right')) x+=20;
        };
        loop = setInterval(() => {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; ctx.shadowBlur = 15; ctx.shadowColor = "#0f0";
            ctx.fillRect(x,y,10,10);
        }, 30);
    }

    // --- GAME 4: CLICKER ---
    function startClicker() {
        ui.innerHTML = `<h1 id="sc">0</h1><button onclick="score++; document.getElementById('sc').innerText=score" style="width:200px; height:200px; border-radius:50%; border:none; background:red; color:white; font-size:2em; cursor:pointer;">TAP ME</button>`;
    }

    // Initialize first game
    startGame('snake');
</script>
</body>
</html>
